<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi Image BW Converter</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap');

        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .drop-zone {
            width: 100%;
            max-width: 800px;
            height: 150px;
            border: 2px dashed #475569;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .drop-zone:hover {
            border-color: var(--primary);
            background: #233149;
        }

        .drop-zone p {
            color: var(--text-dim);
            margin: 5px 0;
        }

        .drop-zone i {
            font-size: 2.5rem;
        }

        .controls {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 20px 40px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            align-items: center;
        }

        label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        input[type="range"] {
            width: 180px;
            accent-color: var(--primary);
        }

        .action-bar {
            margin-bottom: 30px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .preview-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .image-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            overflow: hidden;
        }

        .filename {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80%;
        }

        .remove-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 1.2rem;
            line-height: 1;
        }

        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            height: 180px;
        }

        .img-box {
            background: #0f172a;
            background-image:
                linear-gradient(45deg, #1e293b 25%, transparent 25%),
                linear-gradient(-45deg, #1e293b 25%, transparent 25%),
                linear-gradient(45deg, transparent 75%, #1e293b 75%),
                linear-gradient(-45deg, transparent 75%, #1e293b 75%);
            background-size: 10px 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .img-box::after {
            content: attr(data-label);
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 0.6rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 5px;
            border-radius: 3px;
        }

        img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="header">
        <h1>Multi Image Converter</h1>
        <p>複数ファイルを一括でPNG変換・保存</p>
    </div>

    <div class="drop-zone" id="drop-zone">
        <i>📁</i>
        <p>複数の画像をドラッグ＆ドロップ</p>
        <p style="font-size: 0.8rem;">PNG / SVG をまとめて変換できます</p>
        <input type="file" id="file-input" class="hidden" accept="image/png, image/svg+xml" multiple>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>Brightness</label>
            <input type="range" id="master-brightness" min="0" max="3" step="0.1" value="1.5">
        </div>
        <div class="control-group">
            <label>Contrast</label>
            <input type="range" id="master-contrast" min="1" max="2000" step="10" value="1000">
        </div>
    </div>

    <div class="action-bar" id="action-bar">
        <button id="download-all-btn" class="btn" disabled>すべての画像を保存 (.png)</button>
    </div>

    <div class="preview-list" id="preview-list">
        <!-- プレビューカードがここに動的に追加されます -->
    </div>

    <canvas id="export-canvas" class="hidden"></canvas>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const previewList = document.getElementById('preview-list');
        const brightnessInput = document.getElementById('master-brightness');
        const contrastInput = document.getElementById('master-contrast');
        const downloadAllBtn = document.getElementById('download-all-btn');
        const canvas = document.getElementById('export-canvas');

        let filesData = []; // { id, name, dataUrl }

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => handleFiles(e.target.files);

        // ドラッグ＆ドロップ処理
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#6366f1'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = '#475569'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#475569';
            handleFiles(e.dataTransfer.files);
        };

        async function handleFiles(files) {
            for (const file of files) {
                if (!file.type.match('image/png') && !file.type.match('image/svg')) continue;

                const dataUrl = await readFileAsDataURL(file);
                const id = Date.now() + Math.random();
                const name = file.name.replace(/\.[^/.]+$/, "");

                filesData.push({ id, name, dataUrl });
                addPreviewCard(id, name, dataUrl);
            }
            updateUIState();
        }

        function readFileAsDataURL(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        function addPreviewCard(id, name, dataUrl) {
            const card = document.createElement('div');
            card.className = 'image-card';
            card.id = `card-${id}`;
            card.innerHTML = `
                <div class="card-header">
                    <span class="filename" title="${name}">${name}</span>
                    <button class="remove-btn" onclick="removeFile(${id})">&times;</button>
                </div>
                <div class="comparison">
                    <div class="img-box" data-label="Original">
                        <img src="${dataUrl}">
                    </div>
                    <div class="img-box" data-label="Converted">
                        <img class="filtered-preview" src="${dataUrl}">
                    </div>
                </div>
            `;
            previewList.appendChild(card);
            updateIndividualFilter(card.querySelector('.filtered-preview'));
        }

        function removeFile(id) {
            filesData = filesData.filter(f => f.id !== id);
            document.getElementById(`card-${id}`).remove();
            updateUIState();
        }

        function updateUIState() {
            downloadAllBtn.disabled = filesData.length === 0;
        }

        function updateIndividualFilter(img) {
            const b = brightnessInput.value;
            const c = contrastInput.value;
            img.style.filter = `invert(100%) brightness(${b}) contrast(${c}%)`;
        }

        function updateAllFilters() {
            document.querySelectorAll('.filtered-preview').forEach(img => {
                updateIndividualFilter(img);
            });
        }

        brightnessInput.oninput = updateAllFilters;
        contrastInput.oninput = updateAllFilters;

        downloadAllBtn.onclick = async () => {
            for (const item of filesData) {
                await downloadImage(item);
                // ブラウザの同時ダウンロード制限を考慮してわずかに待機
                await new Promise(r => setTimeout(r, 100));
            }
        };

        function downloadImage(item) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = () => {
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;

                    const b = brightnessInput.value;
                    const c = contrastInput.value;
                    ctx.filter = `invert(100%) brightness(${b}) contrast(${c}%)`;

                    ctx.drawImage(img, 0, 0);

                    const link = document.createElement('a');
                    link.download = `convertor-${item.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    resolve();
                };
                img.src = item.dataUrl;
            });
        }
    </script>
</body>

</html>
